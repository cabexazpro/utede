<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .login-container,
        .busqueda-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #141010;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="login-container">
            <h1 onclick="saludo('titulo');">Registro de Usuarios</h1>
            <form name="registro_login" id="registro_login">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input  type="text" id="correo" name="correo" >
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" >
                </div>
                <button type="submit" onclick="guardar()">Guardar</button>
                
            </form>
        </div>
        
        <div class="busqueda-container">
            <h1>Buscar Usuarios</h1>
            <form name="busqueda" id="busqueda">
                <div class="form-group">
                    <label for="search">Buscar por Email</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="busco" name="busco"  style="flex: 1;">
                        <input onclick="saludo('boton');" type="submit" value="buscar" style="width: auto; padding: 12px 20px;">
                    </div>
                </div> 
                <div id="resultados">
                    <table id="datos">
                        <thead>
                            <tr>
                                <th>Correo</th>
                                <th>Contraseña</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>

                    </table>
                </div>     
            </form>    
        </div>
    </div>
    <script> 
        //alert("Hola, javascript esta funcionando");
        function saludo(donde) {
            alert("Hola, has hecho click en " + donde);
        }
             const estudiantes = [];
     
        function guardar(){
            const FoRe = document.getElementById("registro_login");
            const tabla = document.querySelector('#datos tbody');
            FoRe.addEventListener("submit", function(event) {
                event.preventDefault(); // Evita que el formulario se envíe de forma tradicional
            });
        
            const correo = document.getElementById("correo").value;
            const password = document.getElementById("password").value;
            const resultados = document.getElementById("resultados");

            const nuevaFila = tabla.insertRow();
            const celda1 = nuevaFila.insertCell(0);
            const celda2 = nuevaFila.insertCell(1);
            const celda3 = nuevaFila.insertCell(2);
            celda1.textContent = correo;
            celda2.textContent = password;
            celda3.innerHTML = '<span onclick="borrarFila(this)">✖</span>';


            document.getElementById("password").value = "";
            document.getElementById("correo").value = "";

            document.getElementById("correo").focus();



        }
        function borrarFila(elemento) {
            elemento.closest('tr').remove();    
        }
        function buscar(){
            const FoRe = document.getElementById("busqueda");
            const tabla = document.querySelector('#datos tbody');
            FoRe.addEventListener("submit", function(event) {
                event.preventDefault(); // Evita que el formulario se envíe de forma tradicional
            });
        
            const busco = document.getElementById("busco").value;
            const resultados = document.getElementById("resultados");

            for (let i = 0; i < tabla.rows.length; i++) {
                const correo = tabla.rows[i].cells[0].textContent;
                if (correo.includes(busco)) {
                    tabla.rows[i].style.display = "";
                } else {
                    tabla.rows[i].style.display = "none";
                }
            }
        }   
         document.getElementById("busco").addEventListener("input", buscar);    
         
    </script>
</body>
</html>
